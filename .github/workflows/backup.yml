name: Daily Supabase Backup

# 毎日深夜1時(JST) に Supabase のデータを CSV にして git にコミット。
# UTC で 16:00 = JST 01:00。
on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch: # 手動実行用(GitHub の Actions タブから "Run workflow")

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 依存パッケージをインストール
        run: npm ci --no-audit --no-fund

      - name: Supabase から CSV を取得
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: node scripts/backup-to-csv.mjs

      - name: 変更があれば自動コミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --staged --quiet; then
            echo "変更なし。コミットせず終了。"
          else
            DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
            git commit -m "chore(backup): ${DATE} Supabase データを自動バックアップ"
            git push
          fi
