<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>アイコン候補 比較</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #F2F2F7; padding: 24px 16px; }
  h1 { font-size: 18px; text-align: center; margin-bottom: 8px; color: #333; }
  .note { font-size: 12px; text-align: center; color: #888; margin-bottom: 24px; line-height: 1.6; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 420px; margin: 0 auto; }
  .option { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .icon-wrap { width: 110px; height: 110px; border-radius: 24%; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.18); display: flex; align-items: center; justify-content: center; }
  .icon-wrap svg { width: 90px; height: 90px; }
  .label { font-size: 13px; color: #444; font-weight: 600; }
  .color-code { font-size: 11px; color: #999; font-family: monospace; }
</style>
</head>
<body>
<h1>アイコン候補（両足・歩行感）</h1>
<p class="note">MDI foot-print アイコン使用<br>参考画像に合わせた配置・角度</p>

<div class="grid" id="grid1"></div>

<script>
const COLORS = [
  { name: 'エメラルド',     bg: '#059669' },
  { name: 'ティール',       bg: '#0D9488' },
  { name: 'ダークグリーン', bg: '#047857' },
  { name: 'シーグリーン',   bg: '#0891B2' },
  { name: 'オーシャン',     bg: '#0E7490' },
  { name: 'ペトロール',     bg: '#155E75' },
];

// MDI foot-print path (original 24x24 viewBox, left foot)
const FOOT = "M16 2A2 2 0 1 1 14 4A2 2 0 0 1 16 2M12.04 3A1.5 1.5 0 1 1 10.54 4.5A1.5 1.5 0 0 1 12.04 3M9.09 4.5A1 1 0 1 1 8.09 5.5A1 1 0 0 1 9.09 4.5M7.04 6A1 1 0 1 1 6.04 7A1 1 0 0 1 7.04 6M14.53 12A2.5 2.5 0 0 0 17 9.24A2.6 2.6 0 0 0 14.39 7H11.91A6 6 0 0 0 6.12 11.4A2 2 0 0 0 6.23 12.8A6.8 6.8 0 0 1 6.91 15.76A6.89 6.89 0 0 1 6.22 18.55A1.92 1.92 0 0 0 6.3 20.31A3.62 3.62 0 0 0 10.19 21.91A3.5 3.5 0 0 0 12.36 16.63A2.82 2.82 0 0 1 11.91 15S11.68 12 14.53 12Z";

// Composed in 44x48 viewBox with padding to prevent clipping
const WALKING_SVG = `
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 48">
  <!-- Left foot: upper-left, rotated outward -->
  <g transform="translate(6, 2) rotate(-15, 11, 12)" fill="white">
    <path d="${FOOT}"/>
  </g>
  <!-- Right foot: lower-right, mirrored + rotated outward -->
  <g transform="translate(22, 12) scale(-1, 1) translate(-24, 0) rotate(15, 12, 12)" fill="white">
    <path d="${FOOT}"/>
  </g>
</svg>`;

const grid = document.getElementById('grid1');
COLORS.forEach(({ name, bg }) => {
  const div = document.createElement('div');
  div.className = 'option';
  div.innerHTML = `
    <div class="icon-wrap" style="background:${bg}">
      ${WALKING_SVG}
    </div>
    <div class="label">${name}</div>
    <div class="color-code">${bg}</div>
  `;
  grid.appendChild(div);
});
</script>
</body>
</html>
