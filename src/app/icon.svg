<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 家庭訪問アプリはオレンジ系で差別化 -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FB923C"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <!-- 背景は viewBox 全体に敷き詰める（iOS が角を自動で丸めるので隙間防止） -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 家のシルエットを中心 (256,256) で 112% -->
  <g transform="translate(256 256) scale(1.12) translate(-256 -256)">
    <!-- 家のシルエット（白）— stroke-linejoin=round で全コーナーを丸めて柔らかく -->
    <path
      fill="#FFFFFF"
      stroke="#FFFFFF"
      stroke-width="32"
      stroke-linejoin="round"
      stroke-linecap="round"
      d="M256 100 L416 252 L382 252 L382 412 L130 412 L130 252 L96 252 Z"/>
    <!-- ドア（ペールオレンジ）— 上端を丸めてアーチドア風に -->
    <path fill="#FED7AA" d="M232 340 Q232 316 256 316 Q280 316 280 340 L280 412 L232 412 Z"/>
    <!-- 窓（ペールオレンジ）— rx 大きめで柔らかく -->
    <rect x="158" y="280" width="48" height="48" rx="12" fill="#FED7AA"/>
    <rect x="306" y="280" width="48" height="48" rx="12" fill="#FED7AA"/>
  </g>
</svg>
